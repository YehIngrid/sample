<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #e0eafc; /* 背景色 */
            overflow: hidden;
        }

        .morph-container {
            width: 300px;
            height: 200px;
            background: #2980b9;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: Arial, sans-serif;
            
            /* 1. 初始狀態：在左上角外，側視紙飛機形狀 */
            /* 這裡使用 8 個點來定義，以便後續平滑變形成長方形 */
            clip-path: polygon(0% 40%, 100% 50%, 20% 60%, 20% 80%, 40% 60%, 0% 40%, 0% 40%, 0% 40%);
            transform: translate(-100vw, -100vh) rotate(25deg);
            
            /* 2. 動畫：3秒完成，包含路徑、位置與顏色變化 */
            animation: flyAndOpen 3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        @keyframes flyAndOpen {
            0% {
                transform: translate(-80vw, -80vh) rotate(25deg) scale(0.6);
                background: #3498db;
            }
            /* 3. 抵達中間前保持飛機形狀 */
            60% {
                transform: translate(0, 0) rotate(15deg) scale(1);
                clip-path: polygon(0% 40%, 100% 50%, 20% 60%, 20% 80%, 40% 60%, 0% 40%, 0% 40%, 0% 40%);
            }
            /* 4. 最後 40% 的時間變形成長方形 */
            100% {
                transform: translate(0, 0) rotate(0deg);
                /* 變形成完整的長方形 (8 個點分別移到四角) */
                clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 100% 100%, 0% 100%, 0% 100%, 0% 0%, 0% 0%);
                background: #ffffff;
                color: #333;
            }
        }

        .content {
            opacity: 0;
            animation: showText 0.5s 2.6s forwards;
        }

        @keyframes showText {
            to { opacity: 1; }
        }
        .paper {
  width: 200px;
  height: 150px;
  background: white;
  transition: all 1s ease-in-out;
  transform-origin: center;
}

/* 當啟動動畫時 (例如加上 .fly class) */
.paper.fly {
  /* 模擬摺疊成三角形 */
  clip-path: polygon(50% 0%, 50% 100%, 100% 100%); 
  /* 3D 翻轉並飛向左上 */
  transform: translate(-100vw, -100vh) rotateY(180deg) rotateZ(-45deg);
}
    </style>
</head>
<body>

    <div class="morph-container">
        <div class="content">
            <h2>Hi, Welcome!</h2>
        </div>
    </div>

</body>
</html>

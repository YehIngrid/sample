<script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
<script>
  (function () {
    var raw = null;
    try { raw = localStorage.getItem('cg-preview'); } catch (e) {}
    if (!raw) { document.getElementById('empty').style.display = 'block'; return; }
    var d = {}; try { d = JSON.parse(raw); } catch (e) { document.getElementById('empty').style.display = 'block'; return; }

    document.getElementById('crumb').style.display = '';
    document.getElementById('layout').style.display = '';

    function esc(s) { var x = document.createElement('div'); x.textContent = s || ''; return x.innerHTML; }
    function fmtDate(ts) { var t = new Date(ts || Date.now()); function p(n){return ('0'+n).slice(-2);} return t.getFullYear() + ' / ' + p(t.getMonth()+1) + ' / ' + p(t.getDate()); }

    // 分類
    if (d.category) { document.getElementById('catPill').textContent = d.category; document.getElementById('crumbCat').textContent = d.category; }
    // 封面（有的話覆蓋 hero 漸層）
    if (d.cover) { var hero = document.getElementById('hero'); hero.style.backgroundImage = d.cover; hero.style.backgroundSize = 'cover'; hero.style.backgroundPosition = 'center'; }
    // 標題／副標
    var titleEl = document.getElementById('title');
    titleEl.textContent = d.title || '（未命名攻略）';
    if (d.titleStyle) titleEl.setAttribute('style', d.titleStyle);
    if (d.subtitle) { var st = document.getElementById('subtitle'); st.textContent = d.subtitle; st.style.display = ''; if (d.subtitleStyle) st.setAttribute('style', d.subtitleStyle + ';display:block'); }
    // meta
    var meta = '<span>' + fmtDate(d.savedAt) + ' 發佈</span><span class="dot"></span>' +
      '<span>約 ' + (d.readMin || 1) + ' 分鐘</span><span class="dot"></span>' +
      '<span>' + (d.words || 0).toLocaleString() + ' 字</span>';
    if (d.year) meta += '<span class="valid-tag"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7 V12 L15 14"/></svg>' + esc(d.year) + '</span>';
    document.getElementById('metaRow').innerHTML = meta;
    // 作者
    document.getElementById('authorName').textContent = d.author || '創作者';
    if (d.titles && d.titles.length) document.getElementById('authorTitles').innerHTML = d.titles.map(function (t) { return '<span class="t">' + esc(t) + '</span>'; }).join('');

    // 本文（article-body.css 提供排版）＋ 全文字級／行距
    var body = document.getElementById('body');
    body.className = 'article-body';
    if (d.fontSize) body.style.fontSize = d.fontSize;
    if (d.lineHeight) body.style.lineHeight = d.lineHeight;
    body.innerHTML = (d.bodyHTML || '') + (d.refsHTML ? '<div class="art-refs">' + d.refsHTML + '</div>' : '');

    // 購買卡
    var priceTop = document.getElementById('priceTop');
    if (d.paid && d.price > 0) {
      priceTop.innerHTML = '<span class="price">$' + d.price.toLocaleString() + '</span><span class="unit">NT$</span>';
      document.getElementById('buyBtnLabel').textContent = '立即解鎖閱讀';
      document.getElementById('previewLine').innerHTML = '購買前開放前 <strong>20%</strong> 免費預覽';
    } else {
      priceTop.innerHTML = '<span class="price">免費</span>';
      document.getElementById('buyBtnLabel').textContent = '免費閱讀全文';
      document.getElementById('previewLine').textContent = '這是一篇免費攻略，全文開放閱讀';
    }
    document.getElementById('ledger').innerHTML =
      '<div class="li"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7 V12 L15 14"/></svg>' + esc(d.year || '長期適用') + '</div>' +
      '<div class="li"><svg viewBox="0 0 24 24"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>' + (d.words || 0).toLocaleString() + ' 字 · 約 ' + (d.readMin || 1) + ' 分鐘</div>' +
      '<div class="li"><svg viewBox="0 0 24 24"><path d="M20 6 9 17 4 12"/></svg>半實名認證作者</div>';

    /* ---------- 幻燈片互動 ---------- */
    function carouselGo(fig, idx) {
      var track = fig.querySelector('.carousel-track'); if (!track) return;
      var n = track.children.length; idx = Math.max(0, Math.min(idx, n - 1));
      fig.dataset.idx = idx; track.style.transform = 'translateX(' + (-idx * 100) + '%)';
      fig.querySelectorAll('.carousel-dots .dot').forEach(function (dt, i) { dt.classList.toggle('on', i === idx); });
    }
    body.addEventListener('click', function (e) {
      var nav = e.target.closest && e.target.closest('.carousel-nav');
      if (nav) { var fig = nav.closest('.carousel'); carouselGo(fig, (+fig.dataset.idx || 0) + (nav.classList.contains('next') ? 1 : -1)); return; }
      var dot = e.target.closest && e.target.closest('.carousel-dots .dot');
      if (dot) { var f2 = dot.closest('.carousel'); carouselGo(f2, [].indexOf.call(dot.parentNode.children, dot)); }
    });
    body.addEventListener('touchstart', function (e) { var t = e.target.closest && e.target.closest('.carousel-track'); if (t) t._sx = e.touches[0].clientX; }, { passive: true });
    body.addEventListener('touchend', function (e) {
      var t = e.target.closest && e.target.closest('.carousel-track'); if (!t || t._sx == null) return;
      var dx = e.changedTouches[0].clientX - t._sx; t._sx = null;
      if (Math.abs(dx) > 40) { var fig = t.closest('.carousel'); carouselGo(fig, (+fig.dataset.idx || 0) + (dx < 0 ? 1 : -1)); }
    }, { passive: true });
    body.querySelectorAll('figure.carousel').forEach(function (fig) { carouselGo(fig, +fig.dataset.idx || 0); });

    /* ---------- 註腳浮層 ---------- */
    var pop = document.getElementById('fnPop'), popT = document.getElementById('fnPopT'), popU = document.getElementById('fnPopU');
    body.addEventListener('click', function (e) {
      var fn = e.target.closest && e.target.closest('sup.fn');
      if (!fn) { pop.style.display = 'none'; return; }
      popT.textContent = fn.dataset.src || '（未填來源）';
      popU.textContent = fn.dataset.url || ''; popU.style.display = fn.dataset.url ? 'block' : 'none';
      var r = fn.getBoundingClientRect();
      pop.style.top = (window.scrollY + r.bottom + 8) + 'px';
      pop.style.left = Math.min(window.scrollX + r.left, window.innerWidth - 296) + 'px';
      pop.style.display = 'block';
    });
    document.addEventListener('click', function (e) { if (!e.target.closest('#fnPop') && !(e.target.closest && e.target.closest('sup.fn'))) pop.style.display = 'none'; });
  })();

  // 手機漢堡
  document.addEventListener('DOMContentLoaded', function () {
    var h = document.querySelector('.mobile-hamburger'), w = document.getElementById('navbarMenu'), b = document.querySelector('.mobile-menu-backdrop');
    function t() { w.classList.toggle('show'); b.classList.toggle('active'); }
    if (h) h.addEventListener('click', t); if (b) b.addEventListener('click', t);
  });
</script>

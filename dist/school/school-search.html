<script>
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const keyword = params.get('q') || '';

  if (!keyword) {
    window.location.href = 'school.html';
    return;
  }

  document.getElementById('searchKeyword').textContent = keyword;

  // Group articles by topic
  const grouped = groupArticlesByTopic(MOCK_ARTICLES, keyword);
  const resultsContainer = document.getElementById('searchResults');
  const emptyState = document.getElementById('emptyState');

  let totalCount = 0;
  Object.values(grouped).forEach(articles => {
    totalCount += articles.length;
  });

  document.getElementById('totalCount').textContent = totalCount;

  if (totalCount === 0) {
    emptyState.style.display = 'block';
    return;
  }

  // Render results grouped by topic
  Object.entries(grouped).forEach(([topicName, articles]) => {
    if (articles.length === 0) return;

    const topic = TOPICS[topicName];
    const section = document.createElement('div');
    section.className = 'topic-section';
    section.innerHTML = `
      <div class="topic-header" onclick="location.href='school-article.html?topic=${topic.id}'">
        <span class="topic-icon">${topic.icon}</span>
        <h2 class="topic-title">${topicName}</h2>
        <span class="topic-count">${articles.length}篇</span>
        <a class="topic-link" href="school-article.html?topic=${topic.id}">查看全部 →</a>
      </div>
      <div class="preview-cards" id="preview-${topic.id}"></div>
    `;

    const preview = section.querySelector(`#preview-${topic.id}`);
    articles.slice(0, 2).forEach(article => {
      const card = document.createElement('a');
      card.href = `school-post.html?id=${article.id}`;
      card.className = 'preview-card';
      card.innerHTML = `
        <div class="preview-title">${article.title}</div>
        <div class="preview-excerpt">${article.excerpt}</div>
        <div class="preview-meta">
          <span>${article.author}</span>
          <span>·</span>
          <span>${article.readTime}</span>
          <span>·</span>
          <span>❤️ ${article.likes}</span>
        </div>
      `;
      preview.appendChild(card);
    });

    resultsContainer.appendChild(section);
  });
});
</script>

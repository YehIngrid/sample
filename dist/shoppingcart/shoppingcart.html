    <div class="col-lg-8">

          <button id="clear-checked" class="cart-toolbar-btn">移除已勾選</button>

    <div class="col-lg-4">

        <div class="summary-section" style="padding-bottom: 0;">

            <span class="badge-cod-text">目前僅支援面對面交付</span>
          </div>
        </div>

        
        <div class="summary-section">
          <h6 class="summary-heading">訂單明細</h6>
          <table class="table table-sm align-middle mb-0" id="checkout-table">
            <thead>
              <tr>
                <th>商品</th>
                <th class="text-center">數量</th>
                <th class="text-end">金額</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        
        <div class="summary-section summary-bottom">
          <div class="summary-row">
            <span>小計</span>
            <span id="subtotal" class="price">NT$ 0</span>
          </div>
          <div class="summary-row">
            <span>運費（面交）</span>
            <span id="shipping-fee" class="summary-free price">免費</span>
          </div>
          <div class="summary-row">
            <span>折扣</span>
            <span id="discount" class="price">- NT$ 0</span>
          </div>

          <div class="summary-divider"></div>

          <div class="summary-row summary-total">
            <span>總計</span>
            <span id="grand-total" class="price">NT$ 0</span>
          </div>

          <button id="checkout-btn" class="summary-checkout-btn">送出訂單</button>
          <p class="summary-hint">只有被勾選的商品會計入本次訂單</p>
        </div>

      </div>
    </div>

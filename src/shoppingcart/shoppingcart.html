<main style="font-size: 1.2rem;">
  <div class="container py-3">
  <div class="page-head">
      <div class="ph-left">
          <h2 class="ph-title">購物車</h2>
          <p class="ph-sub">請確認清單商品，準備進行結帳</p>
      </div>
  </div>
<svg xmlns="http://www.w3.org/2000/svg" class="d-none">
  <symbol id="exclamation-triangle-fill" viewBox="0 0 16 16">
    <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
  </symbol>
</svg>
  <div class="row g-4">
    <!-- 商品清單 -->
    <div class="col-lg-8">
      <div class="cart-toolbar">
        <label class="cart-select-all">
          <input class="form-check-input" type="checkbox" id="checkAll">
          <span>全選</span>
        </label>
        <div class="cart-toolbar-hint">
          <i class="bi bi-info-circle"></i> 同一訂單僅限<strong>同位賣家</strong>的商品
        </div>
        <div class="cart-toolbar-actions">
          <button id="clear-checked" class="cart-toolbar-btn">移除已勾選</button>
          <button id="clear-all" class="cart-toolbar-btn cart-toolbar-btn-danger">清空</button>
        </div>
      </div>
      <div id="cart-items" class="cart-list">
        <!-- 動態插入購物車商品項目 -->
      </div>
    </div>

    <!-- 結帳摘要 -->
    <div class="col-lg-4">
      <div class="summary-card">

        <!-- 運送方式提示 -->
        <div class="summary-section" style="padding-bottom: 0;">
          <div class="summary-shipping-badge" style="margin-top: 0;">
            <span class="badge-cod">面交取貨</span>
            <span class="badge-cod-text">目前僅支援面對面交付</span>
          </div>
        </div>

        <!-- 訂單商品明細 -->
        <div class="summary-section">
          <h6 class="summary-heading">訂單明細</h6>
          <table class="table table-sm align-middle mb-0" id="checkout-table">
            <thead>
              <tr>
                <th>商品</th>
                <th class="text-center">數量</th>
                <th class="text-end">金額</th>
              </tr>
            </thead>
            <tbody><!-- 動態插入 --></tbody>
          </table>
        </div>

        <!-- 下半：金額摘要 + 結帳 -->
        <div class="summary-section summary-bottom">
          <div class="summary-row">
            <span>小計</span>
            <span id="subtotal" class="price">NT$ 0</span>
          </div>
          <div class="summary-row">
            <span>運費（面交）</span>
            <span id="shipping-fee" class="summary-free price">免費</span>
          </div>
          <div class="summary-row">
            <span>折扣</span>
            <span id="discount" class="price">- NT$ 0</span>
          </div>

          <div class="summary-divider"></div>

          <div class="summary-row summary-total">
            <span>總計</span>
            <span id="grand-total" class="price">NT$ 0</span>
          </div>

          <button id="checkout-btn" class="summary-checkout-btn">送出訂單</button>
          <p class="summary-hint">只有被勾選的商品會計入本次訂單</p>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- 手機版固定底部結帳列 -->
<div class="mobile-checkout-bar d-lg-none">

    </div>
    <button class="mobile-checkout-btn" id="checkout-btn-mobile">送出訂單</button>
  </div>
</div>

<button class="chaticon" id="chaticon" title="開啟聊天室">
    <img src="../svg/chaticon.svg" alt="聊天室icon點擊開啟聊天室">
    <!-- 紅點，預設隱藏，fixed 定位對齊 chaticon 右上角 -->
    <span id="chatUnreadDot" style="
        display: none;
        position: absolute;
        top: 0px;
        right: 0px;
        width: 12px;
        height: 12px;
        background: red;
        border-radius: 50%;
        border: 2px solid white;
        pointer-events: none;
    "></span>
</button>
<iframe style="display: none;" id="talkInterface"></iframe>

<script>
// ② 收到 iframe（chatroom）傳來的事件
window.addEventListener('chatUnread', () => {
    document.getElementById('chatUnreadDot').style.display = 'block';
    document.getElementById('newMessageComing')?.classList.remove('d-none');
});
window.addEventListener('chatRead', () => {
    document.getElementById('chatUnreadDot').style.display = 'none';
    //document.getElementById('newMessageComing')?.classList.add('d-none');
});
// ③ 點擊 chaticon 開啟 iframe 時也清除紅點
document.getElementById('chaticon').addEventListener('click', () => {
    //document.getElementById('chatUnreadDot').style.display = 'none';
});
</script>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>網站更新中 — 拾貨寶庫</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f5f8fc;
      font-family: 'Noto Sans TC', 'PingFang TC', sans-serif;
      color: #333;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,75,151,0.10);
      padding: 48px 40px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .card img {
      width: 220px;
      max-width: 80%;
      margin-bottom: 28px;
      border-radius: 12px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #004b97;
      margin-bottom: 12px;
    }
    p {
      font-size: 0.95rem;
      color: #666;
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .btn {
      display: inline-block;
      padding: 10px 28px;
      background: #004b97;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn:hover { background: rgb(36,182,133); }
    .code {
      margin-top: 20px;
      font-size: 0.78rem;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://http.cat/500" alt="系統錯誤">
    <h1>網站正在更新中</h1>
    <p>我們正在進行系統維護與更新，<br>請稍後再回來看看，造成不便敬請見諒。</p>
    <a class="btn" href="/">重新整理</a>
    <p class="code">Error 500 — Internal Server Error</p>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <title>攻略內文 | TreasureHub 校園攻略站</title>
    <meta charset="UTF-8">
    <link rel="manifest" href="../manifest.json">
    <link rel="apple-touch-icon" href="../image/bigLogo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../treasurehubIcon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="../default/default.css">
    <link rel="stylesheet" href="../default/default-font.css">
    <link rel="stylesheet" href="school.css">
    <link rel="stylesheet" href="school-post.css">
    <script type="module" src="../default/default.js"></script>
</head>
<body>

<!-- ── Navbar ── -->
<div class="header">
    <nav class="navbar navbar-expand-lg navbar-light bg-color header_new sticky-top" style="box-shadow: 0 0 2px rgba(0,0,0,0.15); display: block !important;">
        <div class="container-fluid d-flex align-items-center" style="padding-bottom: 8px;">
            <button class="navbar-toggler d-lg-none me-2 order-0" type="button"
                    data-bs-toggle="collapse" data-bs-target="#postNavbarNav"
                    aria-controls="postNavbarNav" aria-expanded="false">
                <img src="../svg/navbar.svg" alt="選單" style="width:20px;">
            </button>
            <a class="navbar-brand order-1 me-3" href="../newhome/newhome.html">
                <span class="school-nav-label">TreasureHub 校園攻略站</span>
            </a>

            <div class="d-none d-lg-flex order-2 ms-3">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" style="color:#383838;" href="../newhome/newhome.html">首頁</a></li>
                    <li class="nav-item"><a class="nav-link school-nav-active" style="color:#004b97;font-weight:600;" href="school.html">校園攻略</a></li>
                    <li class="nav-item"><a class="nav-link" style="color:#383838;" href="../shop/shop.html">購物首頁</a></li>
                    <li class="nav-item"><a class="nav-link" style="color:#383838;" href="../commodity/commodity.html">購物商場</a></li>
                    <li class="nav-item"><a class="nav-link" style="color:#383838;" href="../wishpool/wishpool.html#wishpool">許願專區</a></li>
                </ul>
            </div>

            <div class="d-flex align-items-center ms-auto order-3 gap-2">
                <button class="school-theme-toggle" id="themeToggle" aria-label="切換主題">
                    <i class="ti ti-moon" id="themeIcon"></i>
                </button>
                <div class="login me-1">
                    <a class="username" href="../person/person.html"></a>
                    <a class="navbar-brand loginornot" href="../account/account.html">登入</a>
                </div>
                <a class="nav-link ms-1 d-none d-lg-inline" href="../shoppingcart/shoppingcart.html">
                    <img src="../svg/shoppingcart.svg" alt="購物車" style="width:22px;">
                </a>
            </div>
        </div>
        <div class="collapse mt-2 d-lg-none" id="postNavbarNav">
            <ul class="navbar-nav mobileNav">
                <li class="nav-item"><a class="nav-link" href="../newhome/newhome.html">首頁</a></li>
                <li class="nav-item"><a class="nav-link" href="school.html">校園攻略</a></li>
                <li class="nav-item"><a class="nav-link" href="../shop/shop.html">購物首頁</a></li>
                <li class="nav-item"><a class="nav-link" href="../commodity/commodity.html">購物商場</a></li>
                <li class="nav-item"><a class="nav-link" href="../wishpool/wishpool.html#wishpool">許願專區</a></li>
            </ul>
        </div>
    </nav>
</div>

<!-- ── Post container ── -->
<div class="sp-wrap container">
    <div class="sp-layout">

        <!-- ── Article ── -->
        <article class="sp-article" id="spArticle">

            <!-- Back + TOC btn -->
            <div class="sp-topbar">
                <a href="school.html" class="sp-back">
                    <i class="ti ti-arrow-left"></i> 返回攻略站
                </a>
            </div>

            <!-- Header -->
            <div class="sp-header">
                <span class="article-badge" id="spBadge"></span>
                <h1 class="sp-title" id="spTitle"></h1>
                <div class="sp-meta" id="spMeta"></div>
            </div>

            <!-- Body -->
            <div class="sp-body" id="spBody"></div>

            <!-- Footer tags -->
            <div class="sp-footer">
                <div class="sp-tags" id="spTags"></div>
            </div>

            <!-- ── 留言區 ── -->
            <section class="sp-comments mt-4" id="spComments">
                <h3 class="sp-comments-title" id="spCommentsTitle">
                    <i class="ti ti-message-circle me-2"></i>留言 <span id="spCommentCount" class="sp-comment-count">0</span>
                    <i class="ti ti-chevron-down sp-comments-toggle"></i>
                </h3>
                <div class="sp-comments-body" id="spCommentsBody">
                    <div class="sp-comment-form">
                        <div class="sp-comment-avatar sp-comment-avatar-me">我</div>
                        <div class="sp-comment-input-wrap">
                            <textarea class="sp-comment-input" id="spCommentInput" rows="1" placeholder="留下你的想法..."></textarea>
                            <div class="sp-comment-form-actions" id="spCommentFormActions" style="display:none;">
                                <button class="sp-comment-cancel" id="spCommentCancel">取消</button>
                                <button class="sp-comment-submit" id="spCommentSubmit">送出</button>
                            </div>
                        </div>
                    </div>
                    <div class="sp-comment-list" id="spCommentList"></div>
                </div>
            </section>

            <!-- 上一篇 / 下一篇 -->
            <nav class="sp-pagination" id="spPagination" aria-label="文章導覽"></nav>

            <!-- 更多攻略 + 創作 -->
            <div class="sp-bottom-row d-flex gap-3">

                <!-- Related articles -->
                <div class="school-sidebar-card flex-grow-1">
                    <div class="school-sidebar-header">
                        <i class="ti ti-layout-list"></i> 更多攻略
                    </div>
                    <div id="spRelated"></div>
                </div>

                <!-- Write CTA -->
                <div class="school-create-card sp-create-inline">
                    <div class="school-create-card-inner">
                        <img src="../svg/newarticle.svg" alt="" class="school-create-icon" aria-hidden="true">
                        <h3 class="school-create-title">分享你的故事</h3>
                        <p class="school-create-desc">把你的攻略分享給更多同學</p>
                        <a href="school-editor.html" class="school-create-cta-btn w-100">
                            <i class="ti ti-pencil-plus me-1"></i>寫一篇攻略
                        </a>
                    </div>
                </div>

            </div>

        </article>

    </div>
</div>

<!-- ── 藥丸型 Action Bar ── -->
<div class="sp-action-bar" id="spActionBar">
    <button class="sp-action-btn" id="spLikeBtn">
        <i class="ti ti-heart"></i>
        <span id="spLikeCount">0</span>
    </button>
    <div class="sp-action-divider"></div>
    <button class="sp-action-btn" id="spCommentScrollBtn">
        <i class="ti ti-message-circle"></i>
        <span id="spActionCommentCount">0</span>
    </button>
    <div class="sp-action-divider"></div>
    <button class="sp-action-btn" id="spShareBtn">
        <i class="ti ti-share"></i>
    </button>
</div>

<!-- ── TOC Panel ── -->
<!-- fab removed -->
<div class="sp-toc-panel" id="spTocPanel">
    <div class="sp-toc-panel-header" id="spTocPanelClose">
        <span class="sp-toc-panel-title"><i class="ti ti-list me-1"></i>目錄</span>
        <i class="ti ti-chevron-up sp-toc-panel-arrow"></i>
    </div>
    <ul class="sp-toc-list" id="spTocList"></ul>
</div>

<!-- ── Footer ── -->
<div class="school-copyright">
  <span>Copyright &copy; 2025 拾貨寶庫｜All Rights Reserved.</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="school-theme.js"></script>
<script src="school-data.js"></script>
<script src="school-post.js"></script>
</body>
</html>

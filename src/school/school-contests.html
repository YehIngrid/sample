    /* ===== contests listing scope ===== */
    html { overflow-x: hidden; }
    body { background: #f6f9fc; }
    .cc-wrap { width: 80vw; max-width: 80vw; margin: 0 auto; padding: 26px 0 96px; }

    .cc-back { display: inline-flex; align-items: center; gap: 6px; background: none; border: none; padding: 0; margin-bottom: 14px; font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: 0.04em; cursor: pointer; transition: all 0.22s ease; }
    .cc-back:hover { color: var(--navy); }
    .cc-back svg { width: 14px; height: 14px; }

    .cc-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.28em; color: var(--muted); }
    .cc-title { font-size: clamp(26px, 4vw, 40px); font-weight: 700; letter-spacing: 0.06em; color: var(--ink); line-height: 1.25; margin-top: 8px; }
    .cc-sub { font-size: 15px; line-height: 1.7; color: var(--body); margin-top: 10px; max-width: 640px; }

    .cc-filters { display: flex; gap: 8px; margin-top: 22px; flex-wrap: wrap; }
    .cc-filter { font-size: 12.5px; font-weight: 700; letter-spacing: 0.04em; padding: 8px 18px; border-radius: 999px; border: 1.5px solid var(--line); background: #fff; color: var(--muted); cursor: pointer; transition: all 0.22s ease; }
    .cc-filter:hover { border-color: var(--navy); color: var(--navy); }
    .cc-filter.active { background: var(--navy); border-color: var(--navy); color: #fff; }

    .cc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 24px; }
    .cc-card { background: #fff; border: 1px solid var(--line); border-radius: 18px; overflow: hidden; cursor: pointer; transition: all 0.22s ease; display: flex; flex-direction: column; }
    .cc-card:hover { transform: translateY(-3px); border-color: var(--navy); box-shadow: 0 16px 36px -22px rgba(0,75,151,0.3); }
    .cc-card .art { height: 130px; background: linear-gradient(120deg, var(--navy), var(--mid) 70%, var(--aqua)); position: relative; flex-shrink: 0; }
    .cc-card .art img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cc-card .art .ct-status { position: absolute; top: 12px; right: 12px; }
    .cc-card .body { padding: 18px 20px 20px; display: flex; flex-direction: column; flex: 1; }
    .cc-card .tagline { font-size: 11px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
    .cc-card .name { font-size: 18px; font-weight: 700; color: var(--ink); margin-top: 6px; letter-spacing: 0.02em; }
    .cc-card .period { font-size: 12px; color: var(--muted); margin-top: 6px; letter-spacing: 0.02em; }
    .cc-card .desc { font-size: 13px; color: var(--body); line-height: 1.65; margin-top: 10px; flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .cc-card .foot { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line); }
    .cc-card .pool { font-size: 15px; font-weight: 700; color: var(--navy); }
    .cc-card .pool span { font-size: 11px; color: var(--muted); font-weight: 400; margin-left: 4px; }
    .cc-card .go { font-size: 12.5px; font-weight: 700; color: var(--navy); letter-spacing: 0.04em; display: inline-flex; align-items: center; gap: 4px; }
    .cc-card .go svg { width: 13px; height: 13px; }

    /* pill (shared with school-contest.html) */
    .ct-status { font-size: 11px; font-weight: 700; padding: 5px 13px; border-radius: 999px; letter-spacing: 0.08em; flex-shrink: 0; }
    .ct-status.live { background: rgba(171,218,213,0.65); color: #007568; }
    .ct-status.upcoming { background: rgba(243,227,181,0.75); color: #a08540; }
    .ct-status.ended { background: rgba(240,242,244,0.9); color: var(--muted); }

    .cc-empty { padding: 60px 20px; text-align: center; color: var(--muted); font-size: 13.5px; line-height: 1.8; }

    @media (max-width: 980px) {
      .cc-wrap { width: 100%; padding: 14px 16px 96px; }
      .cc-grid { grid-template-columns: 1fr; }
    }

<script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const hamburger = document.querySelector('.mobile-hamburger');
  const menuWrapper = document.getElementById('navbarMenu');
  const backdrop = document.querySelector('.mobile-menu-backdrop');
  const menuLinks = document.querySelectorAll('.mobile-menu a');
  function toggleMenu() {
    menuWrapper.classList.toggle('show');
    backdrop.classList.toggle('active');
    hamburger.classList.toggle('active');
  }
  function closeMenu() {
    menuWrapper.classList.remove('show');
    backdrop.classList.remove('active');
    hamburger.classList.remove('active');
  }
  if (hamburger) hamburger.addEventListener('click', toggleMenu);
  if (backdrop) backdrop.addEventListener('click', closeMenu);
  menuLinks.forEach(link => link.addEventListener('click', closeMenu));
});
</script>

<script>
  /* ---------- 競賽資料（之後有新比賽只要加一筆，與 school-contest.html 保持同步） ---------- */
  var CONTESTS = {
    'seed2026': {
      name: '種子創作者計劃',
      tagline: '首屆攻略徵稿',
      status: 'live',
      start: '2026-06-01', end: '2026-08-31',
      art: '../svg/contestad.svg',
      desc: '首屆攻略徵稿活動。徵稿期間發佈的攻略都會自動列入計分，依人氣積分排出名次——寫下你最擅長的推甄、證照、實習或選課心得，讓好內容被看見，還能抱走獎金。',
      pool: 30000
    },
    'notefest2026': {
      name: '期中筆記祭',
      tagline: '第二彈徵稿 · 即將開始',
      status: 'upcoming',
      start: '2026-10-12', end: '2026-11-15',
      art: null,
      desc: '期中考週最需要的就是一份好筆記。徵求各系所必修科目的重點整理與應考攻略，開賽後同步開放報名，獎項內容陸續公布。',
      pool: 20000
    },
    'freshman2026': {
      name: '新生攻略月',
      tagline: '2026 春季徵稿 · 已結束',
      status: 'ended',
      start: '2026-02-01', end: '2026-03-15',
      art: null,
      desc: '為新生而寫：選課、宿舍、社團、打工與校園生存指南徵稿。活動已圓滿結束，恭喜所有得獎創作者！',
      pool: 15000
    }
  };
  var STATUS_TXT = { live: '進行中', upcoming: '即將開始', ended: '已結束' };
  var STATUS_ORDER = { live: 0, upcoming: 1, ended: 2 };

  (function () {
    var $ = function (id) { return document.getElementById(id); };

    document.getElementById('ccBack').addEventListener('click', function () {
      if (history.length > 1 && document.referrer) history.back();
      else location.href = 'school.html';
    });

    function fmt(n) { return n.toLocaleString('en-US'); }
    function fmtDate(s) { return s.replace(/-/g, '/'); }

    var keys = Object.keys(CONTESTS).sort(function (a, b) {
      return STATUS_ORDER[CONTESTS[a].status] - STATUS_ORDER[CONTESTS[b].status];
    });

    function render(filter) {
      var grid = $('ccGrid');
      grid.innerHTML = '';
      var shown = keys.filter(function (key) {
        return filter === 'all' || CONTESTS[key].status === filter;
      });

      if (!shown.length) {
        var empty = document.createElement('div');
        empty.className = 'cc-empty';
        empty.textContent = '目前沒有符合條件的競賽。';
        grid.appendChild(empty);
        return;
      }

      shown.forEach(function (key) {
        var o = CONTESTS[key];
        var card = document.createElement('div');
        card.className = 'cc-card';

        var art = document.createElement('div'); art.className = 'art';
        if (o.art) {
          var img = document.createElement('img'); img.src = o.art; img.alt = '';
          art.appendChild(img);
        }
        var stp = document.createElement('span');
        stp.className = 'ct-status ' + o.status;
        stp.textContent = STATUS_TXT[o.status];
        art.appendChild(stp);

        var body = document.createElement('div'); body.className = 'body';
        var tagline = document.createElement('div'); tagline.className = 'tagline'; tagline.textContent = o.tagline;
        var name = document.createElement('div'); name.className = 'name'; name.textContent = o.name;
        var period = document.createElement('div'); period.className = 'period';
        period.textContent = '徵稿期間 ' + fmtDate(o.start) + ' – ' + fmtDate(o.end);
        var desc = document.createElement('div'); desc.className = 'desc'; desc.textContent = o.desc;

        var foot = document.createElement('div'); foot.className = 'foot';
        var pool = document.createElement('div'); pool.className = 'pool';
        pool.innerHTML = 'NT$ ' + fmt(o.pool) + '<span>總獎金</span>';
        var go = document.createElement('div'); go.className = 'go';
        go.innerHTML = '查看詳情 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12 H19"/><path d="m12 5 7 7-7 7"/></svg>';
        foot.appendChild(pool); foot.appendChild(go);

        body.appendChild(tagline); body.appendChild(name); body.appendChild(period);
        body.appendChild(desc); body.appendChild(foot);
        card.appendChild(art); card.appendChild(body);

        card.addEventListener('click', function () { location.href = 'school-contest.html?id=' + key; });
        grid.appendChild(card);
      });
    }

    var filters = document.querySelectorAll('.cc-filter');
    filters.forEach(function (btn) {
      btn.addEventListener('click', function () {
        filters.forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        render(btn.getAttribute('data-status'));
      });
    });

    render('all');
  })();
</script>

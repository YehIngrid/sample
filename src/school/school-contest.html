  <script type="module" src="../default/default.js"></script>
  <style>
    /* ===== contest scope ===== */
    html { overflow-x: hidden; }
    body { background: #f6f9fc; }
    .ct-wrap { width: min(1080px, 92vw); margin: 0 auto; padding: 26px 0 96px; }

    /* back */
    .ct-back { display: inline-flex; align-items: center; gap: 6px; background: none; border: none; padding: 0; margin-bottom: 14px; font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: 0.04em; cursor: pointer; transition: all 0.22s ease; }
    .ct-back:hover { color: var(--navy); }
    .ct-back svg { width: 14px; height: 14px; }

    /* hero */
    .ct-hero { border-radius: 18px; overflow: hidden; border: 1px solid var(--line); background: #fff; }
    .ct-banner { display: block; width: 100%; aspect-ratio: 3 / 1; object-fit: cover; background: var(--cream); }
    .ct-banner.ph { display: flex; align-items: center; justify-content: center; background: linear-gradient(120deg, var(--navy), var(--mid) 70%, var(--aqua)); }
    .ct-banner.ph span { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: 0.2em; }
    .ct-head { padding: 22px 26px 24px; }
    .ct-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.28em; color: var(--muted); }
    .ct-title-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
    .ct-title { font-size: clamp(26px, 4vw, 40px); font-weight: 700; letter-spacing: 0.06em; color: var(--ink); line-height: 1.25; }
    .ct-status { font-size: 11px; font-weight: 700; padding: 5px 13px; border-radius: 999px; letter-spacing: 0.08em; flex-shrink: 0; }
    .ct-status.live { background: rgba(171,218,213,0.45); color: #007568; }
    .ct-status.upcoming { background: rgba(243,227,181,0.55); color: #a08540; }
    .ct-status.ended { background: #f0f2f4; color: var(--muted); }
    .ct-period { font-size: 12.5px; color: var(--muted); letter-spacing: 0.04em; margin-top: 8px; }
    .ct-desc { font-size: 15px; line-height: 1.7; color: var(--body); margin-top: 12px; max-width: 720px; }
    .ct-cta { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
    .ct-btn { display: inline-flex; align-items: center; gap: 7px; padding: 11px 22px; border-radius: 999px; font-size: 13.5px; font-weight: 700; letter-spacing: 0.06em; border: 1.5px solid transparent; cursor: pointer; transition: all 0.22s ease; }
    .ct-btn svg { width: 15px; height: 15px; }
    .ct-btn.primary { background: var(--navy); color: #fff; }
    .ct-btn.primary:hover { background: rgb(36,182,133); }
    .ct-btn.primary[disabled] { background: #c6d3de; cursor: default; }
    .ct-btn.ghost { background: #fff; border-color: var(--line); color: var(--ink); }
    .ct-btn.ghost:hover { border-color: var(--navy); color: var(--navy); }

    /* stat strip */
    .ct-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-top: 16px; }
    .ct-stat { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 16px 20px; }
    .ct-stat .l { font-size: 11px; letter-spacing: 0.1em; color: var(--muted); }
    .ct-stat .v { font-size: 22px; font-weight: 700; color: var(--ink); margin-top: 7px; }
    .ct-stat .v .u { font-size: 12px; color: var(--muted); font-weight: 500; margin-left: 2px; }

    /* 加碼獎機制（達標解鎖加碼獎金） */
    .ct-bonus {
      margin-top: 16px; border-radius: 18px; padding: 20px 24px;
      background: linear-gradient(135deg, rgba(243,227,181,0.4), rgba(243,227,181,0.1));
      border: 1.5px solid rgba(160,133,64,0.3);
    }
    .ct-bonus.unlocked {
      background: linear-gradient(135deg, rgba(171,218,213,0.4), rgba(171,218,213,0.1));
      border-color: rgba(0,117,104,0.3);
    }
    .ct-bonus-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .ct-bonus-tag {
      font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
      color: #a08540; background: rgba(243,227,181,0.65); padding: 4px 12px; border-radius: 999px;
    }
    .ct-bonus.unlocked .ct-bonus-tag { color: #007568; background: rgba(171,218,213,0.65); }
    .ct-bonus-name { font-size: 14.5px; font-weight: 700; color: var(--ink); letter-spacing: 0.02em; }
    .ct-bonus-msg { font-size: 14px; line-height: 1.75; color: var(--body); margin-top: 10px; }
    .ct-bonus-msg b { font-size: 17px; color: #a08540; }
    .ct-bonus.unlocked .ct-bonus-msg b { color: #007568; }
    .ct-bonus-bar { margin-top: 14px; height: 8px; border-radius: 999px; background: #fff; overflow: hidden; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05); }
    .ct-bonus-bar .fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--cream), #e0b354); transition: width 0.6s ease; }
    .ct-bonus.unlocked .ct-bonus-bar .fill { background: linear-gradient(90deg, var(--aqua), #007568); }
    .ct-bonus-foot { display: flex; justify-content: space-between; margin-top: 7px; font-size: 11.5px; color: var(--muted); letter-spacing: 0.02em; }

    /* sections */
    .ct-sec { margin-top: 36px; }
    .ct-sec-h { font-size: 20px; font-weight: 700; letter-spacing: 0.04em; color: var(--ink); margin-bottom: 14px; }
    .ct-sec-h span { font-size: 12px; color: var(--muted); font-weight: 400; margin-left: 10px; letter-spacing: 0.02em; }

    /* prizes */
    .ct-prizes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .ct-prize { background: #fff; border: 1px solid var(--line); border-radius: 18px; padding: 20px 22px; transition: all 0.22s ease; }
    .ct-prize:hover { transform: translateY(-3px); border-color: var(--navy); box-shadow: 0 16px 36px -22px rgba(0,75,151,0.3); }
    .ct-prize .medal { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; }
    .ct-prize.g .medal { background: rgba(243,227,181,0.55); color: #a08540; }
    .ct-prize.s .medal { background: #eef2f6; color: #6f87a0; }
    .ct-prize.b .medal { background: rgba(201,127,90,0.16); color: var(--terracotta); }
    .ct-prize.x .medal { background: var(--alice); color: var(--navy); }
    .ct-prize .pn { font-size: 14.5px; font-weight: 700; color: var(--ink); margin-top: 12px; letter-spacing: 0.02em; }
    .ct-prize .pa { font-size: 20px; font-weight: 700; color: var(--navy); margin-top: 4px; }
    .ct-prize .pd { font-size: 12px; color: var(--muted); line-height: 1.65; margin-top: 6px; }
    .ct-prize.wide { grid-column: span 3; display: flex; align-items: center; gap: 18px; }
    .ct-prize.wide .medal { margin: 0; flex-shrink: 0; }
    .ct-prize.wide .pn, .ct-prize.wide .pa { margin-top: 0; }
    .ct-prize.wide .pd { margin-top: 3px; }
    .ct-prize.wide .pbody { flex: 1; }

    /* scoring */
    .ct-score-card { background: #fff; border: 1px solid var(--line); border-radius: 18px; padding: 22px 24px; }
    .ct-formula { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .ct-f-item { background: var(--alice); border-radius: 12px; padding: 10px 16px; text-align: center; }
    .ct-f-item .n { font-size: 15px; font-weight: 700; color: var(--navy); }
    .ct-f-item .t { font-size: 11px; color: var(--muted); margin-top: 2px; letter-spacing: 0.04em; }
    .ct-f-op { font-size: 16px; font-weight: 700; color: var(--muted); }
    .ct-rules { margin: 16px 0 0; padding: 14px 0 0; border-top: 1px solid var(--line); }
    .ct-rules li { font-size: 12.5px; color: var(--muted); line-height: 1.8; list-style: none; position: relative; padding-left: 16px; }
    .ct-rules li::before { content: ""; position: absolute; left: 2px; top: 0.75em; width: 5px; height: 5px; border-radius: 50%; background: var(--sky); }

    /* leaderboard */
    .ct-board { background: #fff; border: 1px solid var(--line); border-radius: 18px; overflow: hidden; }
    .ct-me-bar { display: flex; align-items: center; gap: 14px; padding: 14px 22px; background: linear-gradient(120deg, var(--navy), var(--navy-d)); color: #fff; }
    .ct-me-bar .rk { font-size: 17px; font-weight: 800; background: rgba(255,255,255,0.18); padding: 4px 14px; border-radius: 999px; letter-spacing: 0.02em; flex-shrink: 0; }
    .ct-me-bar .tx { font-size: 13px; letter-spacing: 0.03em; flex: 1; min-width: 0; }
    .ct-me-bar .tx b { font-weight: 700; }
    .ct-me-bar .gap { font-size: 11.5px; color: rgba(255,255,255,0.75); flex-shrink: 0; }
    .ct-bhead, .ct-brow { display: grid; grid-template-columns: 64px 1.2fr 1.8fr 110px; gap: 12px; padding: 13px 22px; align-items: center; }
    .ct-bhead { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; border-bottom: 1px solid var(--line); }
    .ct-brow { border-bottom: 1px solid var(--line); font-size: 13.5px; color: var(--ink); }
    .ct-brow:last-child { border-bottom: none; }
    .ct-brow .rk { font-size: 14px; font-weight: 800; color: var(--muted); font-variant-numeric: tabular-nums; }
    .ct-brow.top1 .rk, .ct-brow.top2 .rk, .ct-brow.top3 .rk { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; }
    .ct-brow.top1 .rk { background: #d9a72c; }
    .ct-brow.top2 .rk { background: #9aabbc; }
    .ct-brow.top3 .rk { background: var(--terracotta); }
    .ct-brow .who { font-weight: 700; letter-spacing: 0.02em; }
    .ct-brow .who .me-tag { font-size: 10px; font-weight: 700; color: #fff; background: var(--navy); border-radius: 999px; padding: 2px 8px; margin-left: 7px; vertical-align: 1px; letter-spacing: 0.08em; }
    .ct-brow .work { font-size: 12.5px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ct-brow .work b { color: var(--body); font-weight: 600; }
    .ct-brow .pt { font-size: 14px; font-weight: 700; color: var(--navy); text-align: right; font-variant-numeric: tabular-nums; }
    .ct-brow.me { background: var(--alice); }
    .ct-bskip { text-align: center; padding: 8px 0; color: var(--muted); font-size: 14px; letter-spacing: 0.3em; border-bottom: 1px solid var(--line); }
    .ct-bfoot { padding: 13px 22px; font-size: 11.5px; color: var(--muted); letter-spacing: 0.02em; }
    .ct-board-empty { padding: 46px 20px; text-align: center; color: var(--muted); font-size: 13px; line-height: 1.7; }

    /* other contests */
    .ct-others { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .ct-oc { background: #fff; border: 1px solid var(--line); border-radius: 18px; overflow: hidden; cursor: pointer; transition: all 0.22s ease; }
    .ct-oc:hover { transform: translateY(-3px); border-color: var(--navy); box-shadow: 0 16px 36px -22px rgba(0,75,151,0.3); }
    .ct-oc .art { height: 92px; background: linear-gradient(120deg, var(--navy), var(--mid) 70%, var(--aqua)); position: relative; }
    .ct-oc .art img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .ct-oc .body { padding: 14px 18px 18px; }
    .ct-oc .on { font-size: 14.5px; font-weight: 700; color: var(--ink); letter-spacing: 0.02em; }
    .ct-oc .od { font-size: 11.5px; color: var(--muted); margin-top: 5px; letter-spacing: 0.03em; }
    .ct-oc .ct-status { margin-top: 10px; display: inline-block; }
    .ct-oc.cur { border-color: var(--navy); box-shadow: 0 0 0 1px var(--navy) inset; cursor: default; }
    .ct-oc.cur:hover { transform: none; }

    @media (max-width: 980px) {
      .ct-wrap { width: 100%; padding: 14px 16px 96px; }
      .ct-stats { grid-template-columns: repeat(2, 1fr); }
      .ct-prizes { grid-template-columns: 1fr; }
      .ct-prize.wide { grid-column: auto; }
      .ct-others { grid-template-columns: 1fr; }
      .ct-bhead { display: none; }
      .ct-brow { grid-template-columns: 40px 1fr 90px; }
      .ct-brow .work { display: none; }
      .ct-me-bar { flex-wrap: wrap; gap: 8px 14px; }
    }
  </style>
</head>

  const hamburger = document.querySelector('.mobile-hamburger');
  const menuWrapper = document.getElementById('navbarMenu');
  const backdrop = document.querySelector('.mobile-menu-backdrop');
  const menuLinks = document.querySelectorAll('.mobile-menu a');
  function toggleMenu() {
    menuWrapper.classList.toggle('show');
    backdrop.classList.toggle('active');
    hamburger.classList.toggle('active');
  }
  function closeMenu() {
    menuWrapper.classList.remove('show');
    backdrop.classList.remove('active');
    hamburger.classList.remove('active');
  }
  if (hamburger) hamburger.addEventListener('click', toggleMenu);
  if (backdrop) backdrop.addEventListener('click', closeMenu);
  menuLinks.forEach(link => link.addEventListener('click', closeMenu));
});

      var on = document.createElement('div'); on.className = 'on'; on.textContent = o.name;
      var od = document.createElement('div'); od.className = 'od';
      od.textContent = fmtDate(o.start) + ' – ' + fmtDate(o.end) + ' · 總獎金 NT$ ' + fmt(o.pool);
      var stp = document.createElement('span');
      stp.className = 'ct-status ' + o.status;
      stp.textContent = key === id ? '目前瀏覽中' : STATUS_TXT[o.status];
      body.appendChild(on); body.appendChild(od); body.appendChild(stp);
      card.appendChild(art); card.appendChild(body);
      if (key !== id) {
        card.addEventListener('click', function () { location.href = 'school-contest.html?id=' + key; });
      }
      $('ctOthers').appendChild(card);
    });
  })();
</script>
</body>
</html>

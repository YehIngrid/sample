<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net unpkg.com cdnjs.cloudflare.com cdn.quilljs.com static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net cdnjs.cloudflare.com fonts.googleapis.com cdn.quilljs.com; font-src 'self' fonts.gstatic.com cdn.jsdelivr.net cdnjs.cloudflare.com; img-src 'self' data: blob: https:; connect-src 'self' static.cloudflareinsights.com; object-src 'none'; base-uri 'self'; form-action 'self';">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <link rel="manifest" href="../manifest.json">
    <link rel="apple-touch-icon" sizes="192x192" href="/image/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>聊天室｜拾貨寶庫</title>
    <link rel="shortcut icon" href="../treasurehubIcon.ico">
    <meta name="description" content="拾貨寶庫即時聊天室 — 與賣家直接議價、確認交易細節，或聯繫平台客服小幫手取得即時協助。"/>
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://treasurehub.tw/chatroom/chatroom.html">
    <meta property="og:title" content="聊天室｜拾貨寶庫">
    <meta property="og:description" content="拾貨寶庫即時聊天室 — 與賣家直接議價、確認交易細節，或聯繫平台客服小幫手取得即時協助。">
    <meta property="og:image" content="https://treasurehub.tw/webP/treasurehub.webp">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" integrity="sha384-l4UPAMHGzl7zwogLW4nOwaU2XTk6oiM1jhCRQstZEndoIiA2I5bg6fST3wzBSRBD" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/dist/tabler-icons.min.css" integrity="sha384-ccZHbezhtZWmNy0cg8odL0D/jFU5k5HIls9y78Qd6lWor7rpvFIZtK0fTFG4z456" crossorigin="anonymous" />
    <link rel="stylesheet" href="chatroom.css?v=2">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" integrity="sha384-6LFfkTKLRlzFtgx8xsWyBdKGpcMMQTkv+dB7rAbugeJAu1Ym2q1Aji1cjHBG12Xh" crossorigin="anonymous">
    <link rel="stylesheet" href="../default/default-font.css">
    <link rel="stylesheet" href="../default/tokens.css">

</head>
<body>
    <!-- 頁面載入遮罩 -->
    <div id="chatLoader" class="chat-loader">
      <div class="loader-wrap">
        <div class="shelf">
          <div class="item it-book"><i class="b1"></i><i class="b2"></i><i class="b3"></i></div>
          <div class="item it-laptop"><div class="screen"></div><div class="base"></div></div>
          <div class="item it-lamp"><div class="shade"></div><div class="neck"></div><div class="base"></div></div>
          <div class="item it-ball"><div class="body"></div><div class="seam"></div></div>
          <div class="item it-shirt"><div class="sl"></div><div class="sr"></div><div class="body"></div><div class="collar"></div></div>
          <div class="item it-gift"><div class="box"></div><div class="lid"></div><div class="vrib"></div><div class="bowL"></div><div class="bowR"></div><div class="knot"></div></div>
        </div>
        <div class="loader-text">
          <p class="brand">連線聊天室中</p>
          <p class="tag">正在載入對話</p>
        </div>
      </div>
    </div>

    <div class="container-fluid h-100">
        <div class="row h-100">
            <!-- 聊天室列表（永遠全屏，滑入滑出） -->
            <div class="col-12 col-md-4 col-lg-3 sidebar p-0" id="sidebar">
                <div class="sidebar-header p-3 d-flex align-items-center">
                    <button id="closeChatFullscreen" class="btn btn-link p-0 me-2" style="color:#fff;font-size:1.2rem;display:none;">
                        <i class="bi bi-arrow-left"></i>
                    </button>
                    <h5 class="mb-0">聊天室</h5>
                </div>
                
                <!-- Sidebar 頂部：LINE 官方帳號 -->
                <div class="sidebar-footer">
                    <a href="https://lin.ee/U7uZmHV" target="_blank" rel="noopener noreferrer" class="sidebar-line-btn">
                        <svg class="sidebar-line-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <rect width="40" height="40" rx="10" fill="#06C755"/>
                            <path d="M33 18.8C33 13.4 27.6 9 21 9S9 13.4 9 18.8c0 4.8 4.3 8.9 10.1 9.6.4.1.9.3 1 .6.1.3.1.7 0 1l-.2 1c-.1.3-.3 1.3 1.1.7 1.4-.6 7.6-4.5 10.4-7.7C32.2 21.9 33 20.4 33 18.8z" fill="white"/>
                        </svg>
                        <span class="sidebar-line-text">
                            <span class="sidebar-line-title">LINE 官方帳號</span>
                            <span class="sidebar-line-sub">加入好友，即時取得最新消息</span>
                        </span>
                        <i class="bi bi-chevron-right sidebar-line-arrow"></i>
                    </a>
                </div>

                <!-- 聊天室列表 -->
                <div class="chat-list" id="chatList">
                    <div class="chat-item" data-room="general">
                        <div class="d-flex align-items-center">
                            <div class="chat-avatar">
                                <img src="../webP/treasurehub.webp" alt="拾貨寶庫官方帳號頭像">
                            </div>
                            <div class="flex-grow-1">
                                <div class="d-flex justify-content-between">
                                    <h6 class="mb-0">拾貨寶庫提醒您</h6>
                                    <small class="text-muted"></small>
                                </div>
                                <small class="text-muted">相關注意事項</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 主聊天區域（永遠全屏，滑入滑出） -->
            <div class="col-12 col-md-8 col-lg-9 chat-main p-0" id="chatMain">
                <!-- 聊天室標題 -->
                <div class="chat-header p-3 border-bottom">
                    <div class="d-flex justify-content-between align-items-center">
                        <!-- 手機版返回按鈕 -->
                        <button class="btn btn-link mobile-back-btn me-2" id="backButton">
                            <i class="bi bi-arrow-left fs-4"></i>
                        </button>
                        <div class="col-9">
                            <h6 class="mb-0">拾貨寶庫提醒您</h6>
                            <small id="chatHeaderSubtitle" class="text-muted" style="font-size:0.72rem;display:none;">無專人服務</small>
                        </div>
                        <div class="d-flex align-items-center gap-1">
                            <button id="toggleMaximizeBtn" class="btn btn-link p-1" style="display:none;color:#4a627a;font-size:1.1rem;line-height:1;" title="放大視窗">
                                <i class="bi bi-arrows-fullscreen"></i>
                            </button>
                            <!-- <button class=" col-8 btn btn-sm btn-outline-secondary" id="connectionStatus">
                                <i class="bi bi-circle-fill text-success"></i> 已連接
                            </button> -->
                            <div class="dropdown">
                                <button class="chat-more-btn" id="chatMoreBtn" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                                    <i class="bi bi-three-dots-vertical"></i>
                                </button>
                                <ul class="dropdown-menu dropdown-menu-end chat-dropdown">
                                    <li>
                                        <a class="chat-dropdown-item" href="#" id="openThemePanel">
                                            <span class="chat-dropdown-icon"><i class="bi bi-palette2"></i></span>
                                            訊息主題
                                        </a>
                                    </li>
                                    <li>
                                        <a class="chat-dropdown-item" href="#" id="toggleSoundBtn">
                                            <span class="chat-dropdown-icon"><i class="bi bi-volume-up-fill" id="soundToggleIcon"></i></span>
                                            <span id="soundToggleLabel">訊息音效</span>
                                        </a>
                                    </li>
                                    <li>
                                        <a class="chat-dropdown-item" href="#" id="enableNotifBtn">
                                            <span class="chat-dropdown-icon"><i class="bi bi-bell" id="notifBellIcon"></i></span>
                                            <span id="notifBtnLabel">桌面通知</span>
                                        </a>
                                    </li>
                                    <li>
                                        <a class="chat-dropdown-item" href="#" id="openRoomInfoBtn">
                                            <span class="chat-dropdown-icon"><i class="bi bi-info-circle"></i></span>
                                            聊天室資訊
                                        </a>
                                    </li>
                                    <li><hr class="chat-dropdown-divider"></li>
                                    <li>
                                        <a class="chat-dropdown-item chat-dropdown-danger" href="#">
                                            <span class="chat-dropdown-icon"><i class="bi bi-flag"></i></span>
                                            檢舉
                                        </a>
                                    </li>
                                </ul>
                            </div>
                            
                        </div>
                    </div>
                </div>

                <!-- 聊天室資訊 Side Panel -->
                <div id="roomInfoPanel" class="room-info-panel">
                    <div class="room-info-panel-header">
                        <span><i class="bi bi-info-circle me-1"></i>聊天室資訊 · <span id="roomInfoPanelTitle"></span></span>
                        <button id="closeRoomInfoPanel" class="room-info-close-btn" aria-label="關閉">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                    <div class="room-info-panel-body" id="roomInfoBody"></div>
                </div>
                <div id="roomInfoOverlay" class="room-info-overlay"></div>

                <!-- SSE 斷線提示 -->
                <div id="sseDisconnectBanner" class="sse-disconnect-banner" style="display:none;">
                    <i class="bi bi-wifi-off me-2"></i>連線中斷，嘗試重新連線中…
                </div>

                <!-- 訊息顯示區 -->
                <div class="messages-container" id="messagesContainer"></div>

                <!-- 捲動到底部按鈕 -->
                <button id="scrollToBottomBtn" class="scroll-to-bottom-btn" style="display:none;" title="捲動到最新訊息">
                    <i class="bi bi-chevron-double-down"></i>
                </button>

                <div id="typingIndicator" class="typing-indicator mt-2" style="display: none;">
                </div>
                <!-- 輸入區域 -->
                <div class="message-input-container p-3 border-top">
                    <!-- 快速回覆 -->
                    <div id="quickReplyBar" class="quick-reply-bar" style="display:none;">
                        <button class="quick-reply-chip" data-text="請問還有嗎？">請問還有嗎？</button>
                        <button class="quick-reply-chip" data-text="請問有瑕疵嗎？">請問有瑕疵嗎？</button>
                        <button class="quick-reply-chip" data-text="可以拍更多照片嗎？">可以拍更多照片嗎？</button>
                        <button class="quick-reply-chip" data-text="好的，沒問題！">好的，沒問題！</button>
                        <button class="quick-reply-chip" data-text="抱歉，我再考慮一下">抱歉，我再考慮一下</button>
                    </div>

                    <!-- 時間選擇面板 -->
                    <div id="timePicker" class="chat-picker-panel" style="display:none;">
                        <div class="picker-label">日期</div>
                        <div class="picker-row" id="timePickerDays">
                            <button class="picker-chip" data-val="今天">今天</button>
                            <button class="picker-chip" data-val="明天">明天</button>
                            <button class="picker-chip" data-val="後天">後天</button>
                        </div>
                        <div class="picker-label">時段 <span class="picker-label-hint">（與確切時間擇一）</span></div>
                        <div class="picker-row" id="timePickerSlots">
                            <button class="picker-chip" data-val="早上">早上</button>
                            <button class="picker-chip" data-val="中午">中午</button>
                            <button class="picker-chip" data-val="下午">下午</button>
                            <button class="picker-chip" data-val="晚上">晚上</button>
                        </div>
                        <div class="picker-label">確切時間 <span class="picker-label-hint">（填入後優先使用）</span></div>
                        <div class="picker-time-row">
                            <input type="time" id="timePickerExact" class="picker-time-input">
                            <button type="button" id="timePickerExactClear" class="picker-time-clear" title="清除時間">×</button>
                        </div>
                        <button id="timePickerConfirm" class="picker-confirm-btn">插入時間</button>
                    </div>

                    <!-- 地點選擇面板 -->
                    <div id="locationPicker" class="chat-picker-panel" style="display:none;">
                        <div class="picker-label">中興大學常見面交地點</div>
                        <div class="picker-row" id="locationPickerChips">
                            <button class="picker-chip" data-val="中興湖旁">中興湖旁</button>
                            <button class="picker-chip" data-val="圖書館正門">圖書館正門</button>
                            <button class="picker-chip" data-val="綜合大樓1F">綜合大樓1F</button>
                            <button class="picker-chip" data-val="惠蓀堂前">惠蓀堂前</button>
                            <button class="picker-chip" data-val="小木屋廣場">小木屋廣場</button>
                            <button class="picker-chip" data-val="理工學院廊道">理工學院廊道</button>
                            <button class="picker-chip" data-val="人文大樓前">人文大樓前</button>
                            <button class="picker-chip" data-val="農業陳列館前">農業陳列館前</button>
                        </div>
                        <button id="locationPickerConfirm" class="picker-confirm-btn">插入地點</button>
                    </div>

                    <!-- 客服機器人選單 -->
                    <div id="csBotMenu" class="cs-bot-menu" style="display:none;">
                        <p class="cs-bot-hint">請選擇想詢問的項目：</p>
                        <div class="cs-bot-options">
                            <button class="cs-bot-option" data-bot-option="1"><i class="bi bi-box-seam"></i>訂單查詢</button>
                            <button class="cs-bot-option" data-bot-option="2"><i class="bi bi-people"></i>面交說明</button>
                            <button class="cs-bot-option" data-bot-option="3"><i class="bi bi-question-circle"></i>常見問題</button>
                        </div>
                    </div>

                    <div id="img-input-container"></div>
                    <form id="messageForm" class="d-flex gap-2">
                        <input type="file" id="image-upload" accept="image/*" hidden>
                        <button type="button" class="sendothericon" id="send-image-btn">
                            <i class="bi bi-image" style="font-size:1.05rem;"></i>
                        </button>
                        <button type="button" class="sendothericon" id="time-picker-btn" title="面交時間">
                            <i class="bi bi-clock" style="font-size:1.05rem;"></i>
                        </button>
                        <button type="button" class="sendothericon" id="location-picker-btn" title="面交地點">
                            <i class="bi bi-geo-alt" style="font-size:1.05rem;"></i>
                        </button>
                        <textarea
                            class="form-control"
                            id="messageInput"
                            placeholder="輸入訊息..."
                            autocomplete="off"
                            maxlength="500"
                            rows="1"
                        ></textarea>
                        <button type="submit" class="sendicon">
                            <img src="../svg/newsend.svg" alt="送出訊息按鈕" style="width: 100%;">
                        </button>
                    </form>
                    <div id="msgCharCount" class="msg-char-count" style="display:none;">0 / 500</div>
                </div>
            </div>
        </div>
    </div>
    <!-- 訊息主題面板 -->
    <div id="themePanel" class="theme-panel" style="display:none;" aria-label="訊息主題">
      <div class="theme-panel-inner">
        <div class="theme-panel-header">
          <span class="theme-panel-title"><i class="bi bi-palette2"></i> 訊息主題</span>
          <button id="closeThemePanel" class="btn-close btn-sm" aria-label="關閉"></button>
        </div>
        <p class="theme-hint">選擇自己訊息泡泡的顏色主題</p>
        <div class="theme-swatches" id="themeSwatches">
          <button class="theme-swatch" data-id="default" data-from="#84a2d4" data-to="#82d3d3" title="藍綠（預設）">
            <span class="swatch-preview" style="background: linear-gradient(to right, #84a2d4, #82d3d3)"></span>
            <small>預設</small>
          </button>
          <button class="theme-swatch" data-id="rose" data-from="#3d4e81" data-to="#6e7ff3" title="星空">
            <span class="swatch-preview" style="background: linear-gradient(to right, #3d4e81, #6e7ff3)"></span>
            <small>星空</small>
          </button>
          <button class="theme-swatch" data-id="mono" data-from="#607d8b" data-to="#90a4ae" title="霧灰藍">
            <span class="swatch-preview" style="background: linear-gradient(to right, #607d8b, #90a4ae)"></span>
            <small>霧灰藍</small>
          </button>
          <button class="theme-swatch" data-id="berry" data-from="#6b4fa0" data-to="#a07cc9" title="莓紫">
            <span class="swatch-preview" style="background: linear-gradient(to right, #6b4fa0, #a07cc9)"></span>
            <small>莓紫</small>
          </button>
          <button class="theme-swatch" data-id="forest" data-from="#f0ada0" data-to="#ac9ef0" title="糖果">
            <span class="swatch-preview" style="background: linear-gradient(to right, #f0ada0, #ac9ef0)"></span>
            <small>糖果</small>
          </button>
          <button class="theme-swatch" data-id="sky" data-from="#ff9a9e" data-to="#fad0c4" title="蜜桃">
            <span class="swatch-preview" style="background: linear-gradient(to right, #ff9a9e, #fad0c4)"></span>
            <small>蜜桃</small>
          </button>
          <button class="theme-swatch" data-id="sunset" data-from="#e65100" data-to="#ffd54f" title="夕陽橙">
            <span class="swatch-preview" style="background: linear-gradient(to right, #e65100, #ffd54f)"></span>
            <small>夕陽橙</small>
          </button>
          <button class="theme-swatch" data-id="warmbrown" data-from="#c17c5a" data-to="#e8b89a" title="暖橘棕">
            <span class="swatch-preview" style="background: linear-gradient(to right, #c17c5a, #e8b89a)"></span>
            <small>暖橘棕</small>
          </button>
          <button class="theme-swatch" data-id="purple" data-from="#f7de98" data-to="#dd97f7" title="夢幻">
            <span class="swatch-preview" style="background: linear-gradient(to right, #f7de98, #dd97f7)"></span>
            <small>夢幻</small>
          </button>
          <button class="theme-swatch" data-id="matcha" data-from="#6b8f71" data-to="#a8c5a0" title="抹茶">
            <span class="swatch-preview" style="background: linear-gradient(to right, #6b8f71, #a8c5a0)"></span>
            <small>抹茶</small>
          </button>
          <button class="theme-swatch" data-id="dark" data-from="#5b8dd9" data-to="#5bbdbd" data-dark="1" title="暗黑">
            <span class="swatch-preview" style="background: linear-gradient(to right, #1e1e2e, #5b8dd9)"></span>
            <small>暗黑</small>
          </button>
          <button class="theme-swatch theme-swatch-custom" data-id="custom" title="自訂顏色">
            <span class="swatch-preview swatch-custom-icon"><i class="bi bi-eyedropper"></i></span>
            <small>自訂</small>
          </button>
        </div>
        <!-- 自訂顏色列 (初始隱藏) -->
        <div id="customColorRow" class="custom-color-row" style="display:none;">
          <div class="d-flex align-items-center gap-2">
            <label class="custom-color-label">顏色 1</label>
            <input type="color" id="customColor1" value="#004b97" class="color-picker">
          </div>
          <div class="d-flex align-items-center gap-2">
            <label class="custom-color-label">顏色 2</label>
            <input type="color" id="customColor2" value="#24b685" class="color-picker">
          </div>
          <button id="applyCustomColor" class="btn btn-sm apply-color-btn">套用</button>
        </div>
      </div>
    </div>
    <div id="themePanelOverlay" class="theme-panel-overlay" style="display:none;"></div>

    <!-- 操作引導 -->
    <div id="chatOnboarding" class="chat-onboarding" style="display:none;">
        <div class="onboarding-backdrop"></div>
        <div class="onboarding-tooltip arrow-down" id="onboardingTooltip">
            <div class="onboarding-step-label" id="onboardingStep">1 / 3</div>
            <div class="onboarding-icon" id="onboardingIcon"></div>
            <div class="onboarding-title" id="onboardingTitle"></div>
            <div class="onboarding-desc" id="onboardingDesc"></div>
            <div class="onboarding-actions">
                <button class="onboarding-skip" id="onboardingSkip">跳過引導</button>
                <button class="onboarding-next" id="onboardingNext">下一步</button>
            </div>
        </div>
    </div>

    <!-- 訊息右鍵選單 -->
    <div id="msgContextMenu" class="msg-context-menu" style="display:none;">
        <button id="msgMenuCopy"><i class="bi bi-copy me-2"></i>複製文字</button>
    </div>

    <!-- Crop Modal -->
    <div class="modal fade" id="chatCropModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header py-2">
            <h5 class="modal-title">裁切圖片</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body p-0" style="background:#111;">
            <div style="height:60vh;overflow:hidden;">
              <img id="chatCropImg" style="display:block;max-width:100%;" alt="裁切照片範圍">
            </div>
          </div>
          <div class="modal-footer py-2">
            <small class="text-muted me-auto">拖曳調整裁切範圍，滾輪縮放</small>
            <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
            <button type="button" class="btn btn-primary btn-sm" id="chatCropConfirm">確認裁切</button>
          </div>
        </div>
      </div>
    </div>

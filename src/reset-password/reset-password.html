<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TNDMCCKZ"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
  <div id="loader">
    <div class="loader-wrap">
      <div class="shelf">
        <div class="item it-book"><i class="b1"></i><i class="b2"></i><i class="b3"></i></div>
        <div class="item it-laptop"><div class="screen"></div><div class="base"></div></div>
        <div class="item it-lamp"><div class="shade"></div><div class="neck"></div><div class="base"></div></div>
        <div class="item it-ball"><div class="body"></div><div class="seam"></div></div>
        <div class="item it-shirt"><div class="sl"></div><div class="sr"></div><div class="body"></div><div class="collar"></div></div>
        <div class="item it-gift"><div class="box"></div><div class="lid"></div><div class="vrib"></div><div class="bowL"></div><div class="bowR"></div><div class="knot"></div></div>
      </div>
      <div class="loader-text">
        <p class="brand">拾貨寶庫</p>
        <p class="tag">驗證連結中</p>
      </div>
    </div>
  </div>

  <div id="whatcontent" class="d-none">
    <div class="rp-page">
      <div class="rp-card">

        <!-- Logo -->
        <a href="../newhome/newhome.html" class="rp-logo-link">
          <img src="../svg/TREASUREHUBCHEN.svg" alt="拾貨寶庫" class="rp-logo">
        </a>

        <!-- 無效 token 狀態 -->
        <div id="state-invalid" class="rp-state d-none">
          <div class="rp-icon rp-icon--error">
            <i class="fa fa-link-slash"></i>
          </div>
          <h5 class="rp-title">連結無效或已過期</h5>
          <p class="rp-desc">此重設密碼連結已失效，請重新申請。</p>
          <a href="../account/account.html" class="rp-btn rp-btn--primary">回到登入頁</a>
        </div>

        <!-- 表單狀態 -->
        <div id="state-form">
          <h5 class="rp-title">設定新密碼</h5>
          <p class="rp-desc">請輸入您的新密碼，設定完成後即可使用新密碼登入。</p>

          <form id="reset-form" novalidate>
            <div class="rp-field">
              <label for="new-password" class="rp-label">新密碼</label>
              <div class="rp-input-wrap">
                <input
                  type="password"
                  id="new-password"
                  class="rp-input"
                  placeholder="至少 8 個字元"
                  maxlength="72"
                  autocomplete="new-password"
                  required
                >
                <button type="button" class="rp-eye" data-target="new-password" aria-label="顯示/隱藏密碼">
                  <i class="fa fa-eye"></i>
                </button>
              </div>
              <div class="rp-error" id="err-password"></div>
            </div>

            <div class="rp-field">
              <label for="confirm-password" class="rp-label">確認新密碼</label>
              <div class="rp-input-wrap">
                <input
                  type="password"
                  id="confirm-password"
                  class="rp-input"
                  placeholder="再次輸入密碼"
                  maxlength="72"
                  autocomplete="new-password"
                  required
                >
                <button type="button" class="rp-eye" data-target="confirm-password" aria-label="顯示/隱藏密碼">
                  <i class="fa fa-eye"></i>
                </button>
              </div>
              <div class="rp-error" id="err-confirm"></div>
            </div>

            <button type="submit" id="submit-btn" class="rp-btn rp-btn--primary w-100">
              <span id="btn-text">確認重設</span>
              <span id="btn-spinner" class="d-none">
                <span class="spinner-border spinner-border-sm me-1" role="status"></span>處理中…
              </span>
            </button>
          </form>
        </div>

        <!-- 成功狀態 -->
        <div id="state-success" class="rp-state d-none">
          <div class="rp-icon rp-icon--success">
            <i class="fa fa-check"></i>
          </div>
          <h5 class="rp-title">密碼重設成功！</h5>
          <p class="rp-desc">您的密碼已更新，請使用新密碼登入。</p>
          <a href="../account/account.html" class="rp-btn rp-btn--primary">前往登入</a>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.16.1/dist/axios.min.js" integrity="sha384-LEhCeSYMzzIZgXNDqOnt039uBFADh2Yf9gaWTpae2Da9UHXEkW6C95emO9aEKIlp" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/sweetalert2@11" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
  <script type="module" src="reset-password.js"></script>
</body>
</html>
